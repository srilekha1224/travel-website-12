<h1>Admin Panel</h1>

<h2>Contact Details</h2>
<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Message</th>
</tr>
<tbody id="contactTable"></tbody>
</table>

<h2>Booking Details</h2>
<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Destination</th>
<th>People</th>
</tr>
<tbody id="bookingTable"></tbody>
</table>

<script>
// Contact Data
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let contactTable = document.getElementById("contactTable");

contacts.forEach(function(c){
    let row = contactTable.insertRow();
    row.insertCell(0).innerText = c.name;
    row.insertCell(1).innerText = c.email;
    row.insertCell(2).innerText = c.message;
});

// Booking Data
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let bookingTable = document.getElementById("bookingTable");

bookings.forEach(function(b){
    let row = bookingTable.insertRow();
    row.insertCell(0).innerText = b.name;
    row.insertCell(1).innerText = b.email;
    row.insertCell(2).innerText = b.destination;
    row.insertCell(3).innerText = b.people;
});
</script>

</body>
</html>
